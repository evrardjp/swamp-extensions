manifestVersion: 1
name: "@evrardjp/ssh-ca"
version: "2026.07.03.2"
description: >-
  Swamp-native OpenSSH CA lifecycle management for every environment: one
  OpenSSH CA keypair per model, host/user certificate issuance,
  @cert-authority/TrustedUserCAKeys generation, KRL generation, revocation data,
  and inventory reporting.
repository: "https://github.com/evrardjp/swamp-extensions"
paths:
  base: manifest
models:
  - ssh_ca.ts
reports:
  - ssh_ca_inventory.ts
workflows: []
vaults: []
drivers: []
datastores: []
additionalFiles:
  - README.md
  - LICENSE.txt
labels:
  - ssh
  - ca
  - openssh
  - security
  - local-infra
dependencies: []
