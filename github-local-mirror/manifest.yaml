  patch revisions, and local review worktrees.
repository: "https://github.com/evrardjp/swamp-extensions"
paths:
  base: manifest
models:
  - github_local_mirror.ts
reports:
  - github_local_mirror_status.ts
workflows: []
vaults: []
drivers: []
datastores: []
additionalFiles:
  - README.md
  - LICENSE.txt
labels:
  - github
  - mirror
  - maintainer
  - pr-review
  - local-development
  - agent
  - ci
  - reporting
dependencies: []
