name: Extension Testing (Reusable)

on:
  workflow_call:
    inputs:
      extension:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      extension:
        description: Extension directory to test
        required: true
        type: choice
        options:
          - arch-cloud-init
          - capability-orchestrator
          - cloud-init-nocloud
          - github-project-activity
          - libvirt-vm-pool
          - openbao-configurator
          - pi-session-telemetry
          - qcow2-overlay-prep
          - selfcert
          - ssh-ca
          - vaultwarden

permissions:
  contents: read

run-name: Test ${{ inputs.extension }}

env:
  DENO_VERSION: v2.8.3

jobs:
  run-extension-task:
    name: ${{ inputs.extension }} - ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - check
          - lint
          - fmt
          - doc
          - test
          - swampfmt
          - swampquality
          - swamppushdryrun
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - uses: systeminit/setup-swamp@v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}

      - name: Run deno task ${{ matrix.task }}
        working-directory: ${{ inputs.extension }}
        run: deno task ${{ matrix.task }}
